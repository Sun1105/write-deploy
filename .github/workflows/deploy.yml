name: Deploy Site to Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 支持手动触发

concurrency:
  group: hexo-deploy   # 同一时间只运行一个部署任务
  cancel-in-progress: true

permissions:
  contents: write   # 必须有写权限，否则推送会报 403

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          # - { name: "Sun1105/Sun1105.github.io", branch: "master" }   # GitHub Pages 仓库
          - { name: "Sun1105/write-deploy", branch: "main" }         # 备份/CI 仓库

    steps:
      - name: Validate deploy token
        run: |
          if [ -z "${{ secrets.PUBLISH_TOKEN }}" ]; then
            echo "Missing secrets.PUBLISH_TOKEN. Create a GitHub PAT with write access to ${{ matrix.repo.name }} and add it as repository secret PUBLISH_TOKEN."
            exit 1
          fi

      # 1️⃣ 拉取源码
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 保留完整 Git 历史

      # 2️⃣ 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ 安装依赖（推荐 npm ci，保证版本一致）
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "skip install (no package.json)"
          fi

      # 4️⃣ 构建 Hexo 静态文件
      - name: Build site
        run: |
          if [ -f package.json ]; then
            npm run build
          else
            echo "skip build (no package.json)"
          fi

      # 5️⃣ 部署到不同仓库（矩阵控制）
      - name: Deploy to ${{ matrix.repo.name }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLISH_TOKEN }}   # PAT，需对两个仓库有写权限
          publish_dir: .                                 # 发布整个仓库，包含 api
          external_repository: ${{ matrix.repo.name }}   # 目标仓库
          publish_branch: ${{ matrix.repo.branch }}     # 目标分支
          commit_message: "🚀 Deploy ${{ github.sha }} to ${{ matrix.repo.name }} (run ${{ github.run_number }})"
